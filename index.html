<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心情画布 · 云端画廊 | 可删除画作</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0eaf4 0%, #cfdef5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
        }

        .paint-studio {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            justify-content: center;
        }

        .canvas-area {
            flex: 2;
            min-width: 320px;
            background: #fffef7;
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
        }

        .gallery-area {
            flex: 3;
            min-width: 340px;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            gap: 12px;
            border-bottom: 2px dashed #ffe1b9;
            padding-bottom: 0.8rem;
        }

        .title-badge {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff8c5a, #ff4d6d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brush-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: white;
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #ffe6e6;
            color: #c23b22;
        }

        .btn-save {
            background: #d4f1f9;
            color: #1f6e8c;
        }

        .btn-delete {
            background: #ffe6e6;
            color: #c23b22;
            font-size: 0.7rem;
            padding: 4px 12px;
        }

        .btn-delete:hover {
            background: #ffc2c2;
        }

        .color-picker-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f2e8da;
            padding: 4px 12px;
            border-radius: 40px;
        }

        #strokeColor {
            width: 40px;
            height: 40px;
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 2px #ddd;
        }

        .range-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            background: #f2e8da;
            padding: 4px 12px;
            border-radius: 40px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            cursor: crosshair;
            width: 100%;
            height: auto;
            background-image: radial-gradient(circle, #e5e5e5 1px, transparent 1px);
            background-size: 20px 20px;
            touch-action: none;
        }

        #drawCanvas {
            background-color: #ffffff;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .gallery-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4a2e2a;
        }

        .readonly-badge {
            background: #e0c3a5;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #3a2a24;
        }

        .cloud-status {
            font-size: 0.7rem;
            background: #cfe6cf;
            padding: 4px 10px;
            border-radius: 30px;
            color: #2d6a2d;
            font-weight: 500;
        }

        .mood-wall {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .mood-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }

        .mood-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.7rem;
            color: #ad8e72;
            font-weight: 500;
            border-left: 4px solid #ffaa77;
            padding-left: 12px;
        }

        .mood-time {
            font-family: monospace;
        }

        .mood-thumb {
            background: #faf3e8;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .mood-thumb img {
            width: 100%;
            border-radius: 16px;
            display: block;
            background: white;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .delete-btn {
            background: #ffe6e6;
            color: #c23b22;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ffc2c2;
            transform: scale(1.02);
        }

        .readonly-tag {
            font-size: 0.65rem;
            color: #ac8e72;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #a47e5c;
            font-style: italic;
            background: #fff3e6;
            border-radius: 28px;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: #7f6b5a;
        }

        footer {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.7rem;
            color: #7f6b5a;
        }

        .error-banner {
            background: #ffebee;
            color: #c62828;
            padding: 8px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            text-align: center;
            margin-top: 8px;
        }

        @media (max-width: 780px) {
            .dashboard { padding: 1rem; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .brush-controls { justify-content: space-between; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="paint-studio">
        <div class="canvas-area">
            <div class="toolbar">
                <div class="title-badge">
                    🎨 Mood Canvas <small>· 云端共享 · 可删除</small>
                </div>
                <div class="brush-controls">
                    <div class="color-picker-wrap">
                        <label>🎨 颜色</label>
                        <input type="color" id="strokeColor" value="#000000">
                    </div>
                    <div class="range-label">
                        <span>✏️ 笔刷</span>
                        <input type="range" id="brushSize" min="2" max="40" value="6" step="1">
                        <span id="sizeValue">6</span>
                    </div>
                    <button id="clearBtn" class="btn-clear">🧽 清空画布</button>
                    <button id="saveMoodBtn" class="btn-save">☁️ 分享到云端</button>
                </div>
            </div>
            <canvas id="drawCanvas" width="700" height="450" style="width:100%; height:auto; max-width:700px; aspect-ratio:700/450"></canvas>
            <div style="font-size: 0.7rem; text-align: center; margin-top: 12px; color:#b4865b;">
                ✨ 绘制你的心情 → 点击「分享到云端」→ 所有人即时可见 | 鼠标移到画作上可看到删除按钮
            </div>
        </div>

        <div class="gallery-area">
            <div class="gallery-header">
                <h2>🌊 云端心情画廊 · 可管理</h2>
                <div style="display: flex; gap: 8px;">
                    <div class="readonly-badge">🗑️ 可删除</div>
                    <div class="cloud-status" id="storageStatus">☁️ 连接中...</div>
                </div>
            </div>
            <div id="moodWallContainer" class="mood-wall">
                <div class="loading-spinner">🎨 正在从云端加载心情画作...</div>
            </div>
            <footer>💡 点击画作放大 | 点击「删除」按钮移除画作</footer>
        </div>
    </div>
</div>

<script type="module">
    // ================= 导入 Firebase SDK =================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        deleteDoc,
        doc,
        query, 
        orderBy, 
        onSnapshot,
        serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // 您的 Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyBnMFA0d8fpSIsB3dj7Jgy30n5m68JXhBI",
        authDomain: "mood-canvas-6893b.firebaseapp.com",
        projectId: "mood-canvas-6893b",
        storageBucket: "mood-canvas-6893b.firebasestorage.app",
        messagingSenderId: "528867103336",
        appId: "1:528867103336:web:93003284eb16819f49a1dd"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const moodsCollection = collection(db, "mood_gallery");
    
    // ================= 绘画引擎 =================
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const CANVAS_W = 700;
    const CANVAS_H = 450;
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    
    let drawing = false;
    let currentColor = document.getElementById('strokeColor').value;
    let currentSize = parseInt(document.getElementById('brushSize').value);
    
    function initCanvasBackground() {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
    initCanvasBackground();
    
    function setBrush() {
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }
    setBrush();
    
    const colorPicker = document.getElementById('strokeColor');
    const sizeSlider = document.getElementById('brushSize');
    const sizeSpan = document.getElementById('sizeValue');
    
    colorPicker.addEventListener('input', (e) => {
        currentColor = e.target.value;
        setBrush();
    });
    sizeSlider.addEventListener('input', (e) => {
        currentSize = parseInt(e.target.value);
        sizeSpan.innerText = currentSize;
        setBrush();
    });
    
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        canvasX = Math.min(Math.max(0, canvasX), canvas.width);
        canvasY = Math.min(Math.max(0, canvasY), canvas.height);
        return { x: canvasX, y: canvasY };
    }
    
    function startDraw(e) {
        drawing = true;
        const { x, y } = getCanvasCoords(e);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
        e.preventDefault();
    }
    
    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const { x, y } = getCanvasCoords(e);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }
    
    function endDraw() {
        drawing = false;
        ctx.beginPath();
    }
    
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', endDraw);
    canvas.addEventListener('touchcancel', endDraw);
    
    document.getElementById('clearBtn').addEventListener('click', () => {
        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        setBrush();
    });
    
    // ================= 云端画廊功能 =================
    function updateStatusText(text, bgColor = "#cfe6cf") {
        const statusEl = document.getElementById('storageStatus');
        if (statusEl) {
            statusEl.innerHTML = `☁️ ${text}`;
            statusEl.style.background = bgColor;
        }
    }
    
    function showErrorMsg(msg) {
        const galleryArea = document.querySelector('.gallery-area');
        let errDiv = document.getElementById('dynamicErrorToast');
        if (!errDiv) {
            errDiv = document.createElement('div');
            errDiv.id = 'dynamicErrorToast';
            errDiv.className = 'error-banner';
            errDiv.style.marginTop = '10px';
            galleryArea.appendChild(errDiv);
        }
        errDiv.innerText = msg;
        errDiv.style.opacity = '1';
        setTimeout(() => {
            errDiv.style.opacity = '0';
            setTimeout(() => {
                if (errDiv && errDiv.parentNode) errDiv.remove();
            }, 500);
        }, 3000);
    }
    
    function formatTime(timestamp) {
        if (!timestamp) return '刚刚';
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return `${Math.floor(diff/60000)} 分钟前`;
        if (diff < 86400000) return `${Math.floor(diff/3600000)} 小时前`;
        return `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }
    
    function showModalPreview(imgSrc) {
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.backgroundColor = 'rgba(0,0,0,0.85)';
        modal.style.display = 'flex';
        modal.style.alignItems = 'center';
        modal.style.justifyContent = 'center';
        modal.style.zIndex = '10000';
        modal.style.backdropFilter = 'blur(8px)';
        modal.style.cursor = 'pointer';
        const imgContainer = document.createElement('div');
        imgContainer.style.maxWidth = '90vw';
        imgContainer.style.maxHeight = '90vh';
        imgContainer.style.backgroundColor = '#fff8f0';
        imgContainer.style.borderRadius = '2rem';
        imgContainer.style.padding = '1rem';
        imgContainer.style.boxShadow = '0 20px 35px rgba(0,0,0,0.4)';
        const img = document.createElement('img');
        img.src = imgSrc;
        img.style.maxWidth = '100%';
        img.style.maxHeight = '70vh';
        img.style.borderRadius = '1.2rem';
        img.style.display = 'block';
        const caption = document.createElement('div');
        caption.innerText = '✨ 云端心情画廊 · 点击任意位置关闭 ✨';
        caption.style.textAlign = 'center';
        caption.style.marginTop = '12px';
        caption.style.fontFamily = 'system-ui';
        caption.style.color = '#5b3e2a';
        imgContainer.appendChild(img);
        imgContainer.appendChild(caption);
        modal.appendChild(imgContainer);
        document.body.appendChild(modal);
        modal.addEventListener('click', function closeModal(e) {
            if (e.target === modal) modal.remove();
        });
        imgContainer.addEventListener('click', (e) => e.stopPropagation());
    }
    
    // 删除画作
    async function deleteMood(moodId, moodTitle) {
        if (confirm(`确定要删除这幅画作吗？\n"${moodTitle}"\n此操作不可撤销。`)) {
            try {
                const moodDoc = doc(db, "mood_gallery", moodId);
                await deleteDoc(moodDoc);
                showErrorMsg(`✅ 已删除画作`);
                console.log(`已删除: ${moodTitle}`);
            } catch (err) {
                console.error('删除失败:', err);
                showErrorMsg(`删除失败: ${err.message}`);
            }
        }
    }
    
    function renderGallery(moodsArray) {
        const container = document.getElementById('moodWallContainer');
        if (!container) return;
        
        if (!moodsArray || moodsArray.length === 0) {
            container.innerHTML = `<div class="empty-message">✨ 云端还没有心情画作… 快画一张分享给大家吧！ ✨</div>`;
            return;
        }
        
        let html = '';
        for (const mood of moodsArray) {
            const timeStr = formatTime(mood.timestamp);
            const imgUrl = mood.dataURL || '';
            if (!imgUrl) continue;
            html += `
                <div class="mood-card" data-id="${mood.id}">
                    <div class="mood-meta">
                        <span>🎨 云端共享 · ${escapeHtml(mood.title || '心情涂鸦')}</span>
                        <span class="mood-time">${timeStr}</span>
                    </div>
                    <div class="mood-thumb" data-fullimg="${imgUrl}">
                        <img src="${imgUrl}" alt="Shared mood from cloud" loading="lazy">
                    </div>
                    <div class="card-footer">
                        <span class="readonly-tag">🌍 全球可见</span>
                        <button class="delete-btn" data-id="${mood.id}" data-title="${escapeHtml(mood.title || '心情涂鸦')}">
                            🗑️ 删除
                        </button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        // 绑定预览事件
        document.querySelectorAll('.mood-thumb').forEach(thumb => {
            thumb.addEventListener('click', (e) => {
                e.stopPropagation();
                const fullImg = thumb.getAttribute('data-fullimg');
                if (fullImg) showModalPreview(fullImg);
            });
        });
        
        // 绑定删除事件
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const moodId = btn.getAttribute('data-id');
                const moodTitle = btn.getAttribute('data-title');
                if (moodId) deleteMood(moodId, moodTitle);
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 添加示例画作（如果画廊为空）
    async function addSampleMoodsIfEmpty() {
        try {
            const q = query(moodsCollection, orderBy('timestamp', 'desc'));
            const snapshot = await new Promise((resolve) => {
                const unsubscribe = onSnapshot(q, (snap) => {
                    unsubscribe();
                    resolve(snap);
                });
            });
            
            if (snapshot.empty) {
                const sampleMoods = [
                    { dataURL: generateSampleDrawing('#FFD966', '#F4A261'), title: '☀️ 阳光灿烂的日子', timestamp: new Date() },
                    { dataURL: generateSampleDrawing('#C4E0FA', '#6C91B2'), title: '🌙 宁静的夜晚', timestamp: new Date(Date.now() - 3600000) }
                ];
                for (const mood of sampleMoods) {
                    await addDoc(moodsCollection, {
                        dataURL: mood.dataURL,
                        title: mood.title,
                        timestamp: mood.timestamp,
                        createdAt: serverTimestamp()
                    });
                }
                console.log('✨ 已添加示例心情画作');
            }
        } catch (err) {
            console.warn('添加示例失败:', err);
        }
    }
    
    function generateSampleDrawing(color1, color2) {
        const offCanvas = document.createElement('canvas');
        offCanvas.width = 700;
        offCanvas.height = 450;
        const offCtx = offCanvas.getContext('2d');
        offCtx.fillStyle = '#FFFFFF';
        offCtx.fillRect(0, 0, 700, 450);
        offCtx.fillStyle = color1;
        offCtx.beginPath();
        offCtx.ellipse(350, 200, 180, 150, 0, 0, Math.PI * 2);
        offCtx.fill();
        offCtx.fillStyle = color2;
        offCtx.beginPath();
        offCtx.arc(270, 170, 22, 0, Math.PI * 2);
        offCtx.arc(430, 170, 22, 0, Math.PI * 2);
        offCtx.fill();
        offCtx.fillStyle = "#6B4E3E";
        offCtx.beginPath();
        offCtx.arc(350, 260, 35, 0.1, Math.PI - 0.1);
        offCtx.fill();
        return offCanvas.toDataURL('image/png');
    }
    
    // 实时监听云端数据
    function subscribeToGallery() {
        const q = query(moodsCollection, orderBy('timestamp', 'desc'));
        
        onSnapshot(q, (snapshot) => {
            const moods = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                moods.push({
                    id: doc.id,
                    dataURL: data.dataURL,
                    timestamp: data.timestamp || data.createdAt,
                    title: data.title || '心情画作'
                });
            });
            renderGallery(moods);
            updateStatusText(`${moods.length} 幅云端画作`, "#a8e6cf");
        }, (error) => {
            console.error('监听云端失败:', error);
            updateStatusText("连接失败", "#ffc2c2");
            showErrorMsg('云端连接失败: ' + error.message);
        });
    }
    
    // 分享当前画作到云端
    async function shareToCloud() {
        const saveBtn = document.getElementById('saveMoodBtn');
        const originalText = saveBtn.innerHTML;
        saveBtn.innerHTML = '⏳ 上传中...';
        saveBtn.disabled = true;
        
        try {
            const dataURL = canvas.toDataURL('image/png');
            if (dataURL.length > 1000000) {
                showErrorMsg('画作数据过大，请简化绘画后重试');
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
                return;
            }
            
            await addDoc(moodsCollection, {
                dataURL: dataURL,
                title: `🎨 心情 · ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`,
                timestamp: new Date(),
                createdAt: serverTimestamp()
            });
            
            saveBtn.innerHTML = '✅ 已分享至云端！';
            updateStatusText("分享成功!", "#b8e0b8");
            setTimeout(() => {
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }, 1500);
        } catch (err) {
            console.error('上传失败:', err);
            showErrorMsg('上传失败: ' + err.message);
            saveBtn.innerHTML = originalText;
            saveBtn.disabled = false;
            updateStatusText("上传失败", "#ffaaaa");
        }
    }
    
    // ================= 初始化应用 =================
    document.getElementById('saveMoodBtn').addEventListener('click', shareToCloud);
    
    // 启动实时画廊
    subscribeToGallery();
    // 添加示例数据（如果为空）
    setTimeout(() => addSampleMoodsIfEmpty(), 1000);
    
    updateStatusText("云端已连接", "#a8e6cf");
    console.log('🎨 Mood Canvas 云端版已启动 - 支持删除画作！');
</script>
</body>
</html>
